<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>mirage's storage</title>
<style>
  body {
    margin: 20px;
    font-family: sans-serif;
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .gallery img {
    max-width: 300px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>
<div style="text-align: center;">
  <h1>Mirage's Storage</h1>
  <h3>みらげの倉庫</h3>
  <p>私が画像や音声のリンクを取得するときとかに使うファイルを保管する場所です</p>
  <p>This is where I store files that I use for example when I retrieve links to images or audio files</p>
  
</div>
<div class="gallery" id="gallery"></div>

<script>
  // img フォルダ内のファイル名をここに書く
  const images = [
    "image.jpg",
    "image2.png",
    "image3.png"
  ];

  const gallery = document.getElementById("gallery");
  images.forEach(name => {
    const img = document.createElement("img");
    img.src = "img/" + name;
    img.alt = name;
    gallery.appendChild(img);
  });
</script>

</body>
</html>
