name: Generate image list

on:
  push:
    paths:
      - 'img/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate images.json
        run: |
          echo "[" > images.json
          first=true
          for f in img/*; do
            filename=$(basename "$f")
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> images.json
            fi
            echo "\"$filename\"" >> images.json
          done
          echo "]" >> images.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet images.json || (git add images.json && git commit -m "Update images.json" && git push)
